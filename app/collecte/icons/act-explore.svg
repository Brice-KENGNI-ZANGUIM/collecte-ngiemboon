<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Explorer">
  <defs>
    <linearGradient id="exCover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fcd34d"/><stop offset=".55" stop-color="#f59e0b"/><stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="exPageL" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#fde9c8"/></linearGradient>
    <linearGradient id="exPageR" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff9ee"/><stop offset="1" stop-color="#f6d9a8"/></linearGradient>
    <linearGradient id="exGloss" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity=".55"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <radialGradient id="exLens" cx="38%" cy="34%" r="70%">
