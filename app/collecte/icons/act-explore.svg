    <filter id="exShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#04121a" flood-opacity="0.42"/>
    </filter>
  </defs>
  <g filter="url(#exShadow)">
    <path d="M26 70 q102 -34 102 0 q0 -34 102 0 v128 q-102 -30 -102 0 q0 -30 -102 0 z" fill="url(#exCover)"/>
