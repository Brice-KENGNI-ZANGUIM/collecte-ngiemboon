      <line x1="56" y1="104" x2="112" y2="92"/><line x1="56" y1="122" x2="112" y2="110"/><line x1="56" y1="140" x2="112" y2="128"/>
      <line x1="144" y1="92" x2="200" y2="104"/><line x1="144" y1="110" x2="200" y2="122"/><line x1="144" y1="128" x2="200" y2="140"/>
    </g>
