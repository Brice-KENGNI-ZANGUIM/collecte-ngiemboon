<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Transcrire">
  <defs>
    <linearGradient id="tsBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9d5ff"/><stop offset=".38" stop-color="#a78bfa"/><stop offset=".7" stop-color="#7c3aed"/><stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="tsGrille" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4c1d95"/><stop offset="1" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="tsGloss" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".9"/><stop offset=".3" stop-color="#ffffff" stop-opacity=".18"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="tsGlow" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#a78bfa" stop-opacity=".6"/><stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tsRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/><stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="tsShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#04121a" flood-opacity="0.42"/>
    </filter>
  </defs>
  <ellipse cx="128" cy="104" rx="92" ry="92" fill="url(#tsGlow)"/>
  <!-- Ondes sonores : cyan à gauche, violet à droite (contraste) -->
  <g stroke="#22d3ee" stroke-width="8" fill="none" stroke-linecap="round" opacity=".95">
    <path d="M40 84 A34 34 0 0 0 40 128"/><path d="M20 70 A56 56 0 0 0 20 142"/>
  </g>
  <g stroke="#a78bfa" stroke-width="8" fill="none" stroke-linecap="round" opacity=".95">
    <path d="M216 84 A34 34 0 0 1 216 128"/><path d="M236 70 A56 56 0 0 1 236 142"/>
  </g>
  <!-- Pied + socle laiton (accent chaud) -->
  <rect x="122" y="150" width="12" height="52" rx="6" fill="url(#tsRing)"/>
  <path d="M92 206 q36 -26 72 0" stroke="url(#tsRing)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Capsule violette -->
  <g filter="url(#tsShadow)">
    <rect x="94" y="26" width="68" height="140" rx="34" fill="url(#tsBody)"/>
    <g clip-path="inset(0 round 34px)">
      <rect x="94" y="26" width="68" height="120" rx="34" fill="url(#tsGrille)" opacity=".82"/>
      <g stroke="#2e1065" stroke-width="4" opacity=".55">
        <line x1="98" y1="56" x2="158" y2="56"/><line x1="98" y1="72" x2="158" y2="72"/>
        <line x1="98" y1="88" x2="158" y2="88"/><line x1="98" y1="104" x2="158" y2="104"/><line x1="98" y1="120" x2="158" y2="120"/>
      </g>
      <g stroke="#22d3ee" stroke-width="3" opacity=".6">
        <line x1="118" y1="30" x2="118" y2="146"/><line x1="138" y1="30" x2="138" y2="146"/>
      </g>
    </g>
    <rect x="94" y="26" width="68" height="140" rx="34" fill="none" stroke="url(#tsRing)" stroke-width="5"/>
    <rect x="103" y="34" width="15" height="118" rx="7.5" fill="url(#tsGloss)"/>
  </g>
</svg>
