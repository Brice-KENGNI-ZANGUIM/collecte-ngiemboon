<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Ngiembɔɔn — Collecte">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.28" r="0.9">
      <stop offset="0" stop-color="#142430"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pxglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Plusieurs ENCOCHES nettes et bien SÉPARÉES qui mordent le bord bas de la
         patte : une grosse + de plus petites (éclats arrachés). La « poussière »
         (pixels) en descend. -->
    <mask id="cut">
      <rect width="512" height="512" fill="#fff"/>
      <rect x="222" y="386" width="8" height="48" fill="#000"/>
      <rect x="230" y="426" width="9" height="8" fill="#000"/>
      <rect x="239" y="384" width="6" height="50" fill="#000"/>
      <rect x="245" y="409" width="10" height="25" fill="#000"/>
      <rect x="255" y="400" width="8" height="34" fill="#000"/>
      <rect x="263" y="422" width="6" height="12" fill="#000"/>
      <rect x="269" y="383" width="7" height="51" fill="#000"/>
      <rect x="276" y="419" width="6" height="15" fill="#000"/>
      <rect x="282" y="384" width="9" height="50" fill="#000"/>
      <rect x="291" y="408" width="7" height="26" fill="#000"/>
      <rect x="298" y="395" width="10" height="39" fill="#000"/>
      <rect x="308" y="418" width="6" height="16" fill="#000"/>
      <rect x="314" y="385" width="10" height="49" fill="#000"/>
    </mask>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Lettre d'origine, agrandie et centrée ; UNE encoche en bas de la patte. -->
  <!-- Masque d'ABORD (forme entaillée) puis glow sur le résultat → les bords des
       fentes sont lumineux comme le reste du contour. -->
  <g filter="url(#glow)">
    <text x="256" y="334" text-anchor="middle" font-family="'DejaVu Sans','Noto Sans',sans-serif"
          font-size="450" font-weight="800" fill="url(#g)" mask="url(#cut)">ŋ</text>
  </g>
  <!-- Pixels DÉTACHÉS et DISPERSÉS (ils ne se touchent PAS), qui descendent en
       s'effaçant. Mêmes dégradé + halo doux (carrés nets). -->
  <g clip-path="url(#tile)" fill="url(#g)" filter="url(#pxglow)">
    <rect x="255" y="436" width="14" height="14" rx="1.4"/>
    <rect x="228" y="448" width="11" height="11" rx="1.3" opacity=".78"/>
    <rect x="285" y="447" width="10" height="10" rx="1.3" opacity=".72"/>
    <rect x="258" y="459" width="11" height="11" rx="1.3" opacity=".62"/>
    <rect x="219" y="462" width="9" height="9" rx="1.1" opacity=".54"/>
    <rect x="303" y="460" width="8" height="8" rx="1.1" opacity=".5"/>
    <rect x="277" y="466" width="9" height="9" rx="1.1" opacity=".5"/>
    <rect x="240" y="470" width="9" height="9" rx="1.1" opacity=".46"/>
    <rect x="313" y="478" width="6" height="6" rx="1" opacity=".3"/>
    <rect x="225" y="478" width="8" height="8" rx="1" opacity=".4"/>
    <rect x="263" y="480" width="8" height="8" rx="1" opacity=".38"/>
    <rect x="291" y="482" width="7" height="7" rx="1" opacity=".3"/>
    <rect x="238" y="490" width="7" height="7" rx="1" opacity=".3"/>
    <rect x="256" y="492" width="6" height="6" rx=".8" opacity=".24"/>
    <rect x="283" y="495" width="6" height="6" rx=".8" opacity=".2"/>
    <rect x="227" y="498" width="6" height="6" rx=".8" opacity=".2"/>
    <rect x="268" y="503" width="5" height="5" rx=".8" opacity=".14"/>
    <rect x="247" y="507" width="5" height="5" rx=".8" opacity=".12"/>
    <rect x="288" y="509" width="5" height="5" rx=".8" opacity=".09"/>
    <!-- Quelques éclats de plus, côté gauche, juste sous la queue rongée. -->
    <rect x="240" y="436" width="10" height="10" rx="1.2" opacity=".68"/>
    <rect x="218" y="448" width="8" height="8" rx="1" opacity=".52"/>
    <rect x="247" y="452" width="7" height="7" rx="1" opacity=".44"/>
    <rect x="230" y="460" width="6" height="6" rx=".9" opacity=".3"/>
    <rect x="210" y="466" width="6" height="6" rx=".9" opacity=".22"/>
    <!-- Quelques éclats de plus côté droit (aucun ne se touche). -->
    <rect x="322" y="442" width="9" height="9" rx="1.1" opacity=".6"/>
    <rect x="336" y="451" width="7" height="7" rx="1" opacity=".46"/>
    <rect x="317" y="459" width="6" height="6" rx=".9" opacity=".34"/>
    <rect x="331" y="467" width="6" height="6" rx=".9" opacity=".24"/>
  </g>
</svg>
